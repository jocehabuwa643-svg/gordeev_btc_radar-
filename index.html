<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC SIGNAL RADAR PRO MAX</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #0d0e12; --panel: #16171d; --accent: #00ff88; --danger: #ff3366; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100%; overflow: hidden; }
        
        /* Панель управления */
        .top-panel { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .glass-card { background: rgba(22, 23, 29, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 12px; pointer-events: all; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #chart-container { width: 100vw; height: 100vh; }
        
        .signal-popup { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--panel); border-left: 5px solid var(--accent); padding: 20px 40px; border-radius: 8px; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .signal-title { font-size: 12px; text-transform: uppercase; color: #888; }
        .signal-direction { font-size: 24px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="top-panel">
        <div class="glass-card">
            <span class="status-dot"></span>
            <span id="bot-status">SCANNING BTC/USDT...</span>
        </div>
        <div class="glass-card">
            <span style="color: #888;">STRATEGY:</span> <span style="color: var(--accent);">SMC CORE V3</span>
        </div>
    </div>

    <div id="signal-alert" class="signal-popup">
        <div class="signal-title">Обнаружен вход по SMC</div>
        <div id="signal-text" class="signal-direction">ВХОД В LONG</div>
    </div>

    <div id="chart-container"></div>

    <script>
        // --- НАСТРОЙКИ ---
        const SYMBOL = 'BTCUSDT';
        const INTERVAL = '1m';
        const HISTORY_LIMIT = 500; // Сколько свечей проверять для истории

        // Звуки (убедись, что файлы лежат в корне GitHub)
        const audioSignal = new Audio('signal.mp3');

        // Инициализация графика
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { backgroundColor: '#0d0e12', textColor: '#d1d4dc', fontSize: 12 },
            grid: { vertLines: { color: '#1f222d' }, horzLines: { color: '#1f222d' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2b2b43' },
            timeScale: { borderColor: '#2b2b43', timeVisible: true, secondsVisible: false },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff3366', borderDownColor: '#ff3366',
            borderUpColor: '#00ff88', wickDownColor: '#ff3366', wickUpColor: '#00ff88',
        });

        let allMarkers = [];

        // Алгоритм анализа (SMC - Smart Money Concepts)
        function analyzeSMC(candles) {
            let markers = [];
            for (let i = 20; i < candles.length; i++) {
                const current = candles[i];
                const prev = candles[i-1];
                
                // Простая, но эффективная логика слома структуры (BOS)
                const localHigh = Math.max(...candles.slice(i-10, i).map(c => c.high));
                const localLow = Math.min(...candles.slice(i-10, i).map(c => c.low));

                if (current.close > localHigh && prev.close <= localHigh) {
                    markers.push({ time: current.time, position: 'belowBar', color: '#00ff88', shape: 'arrowUp', text: 'BOS BUY' });
                } 
                else if (current.close < localLow && prev.close >= localLow) {
                    markers.push({ time: current.time, position: 'aboveBar', color: '#ff3366', shape: 'arrowDown', text: 'BOS SELL' });
                }
            }
            return markers;
        }

        async function updateData() {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${SYMBOL}&interval=${INTERVAL}&limit=${HISTORY_LIMIT}`);
                const rawData = await response.json();
                
                const candles = rawData.map(d => ({
                    time: d[0] / 1000,
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4])
                }));

                candleSeries.setData(candles);

                // Генерируем сигналы по всей истории
                const newMarkers = analyzeSMC(candles);
                
                // Проверяем, появился ли новый сигнал на последней свече
                if (newMarkers.length > allMarkers.length && allMarkers.length > 0) {
                    const lastSignal = newMarkers[newMarkers.length - 1];
                    showPopup(lastSignal.text);
                }

                allMarkers = newMarkers;
                candleSeries.setMarkers(allMarkers);
                document.getElementById('bot-status').innerText = "LIVE SCANNER ACTIVE";

            } catch (e) {
                console.error("Data error", e);
                document.getElementById('bot-status').innerText = "CONNECTION ERROR";
            }
        }

        function showPopup(text) {
            const el = document.getElementById('signal-alert');
            const txt = document.getElementById('signal-text');
            txt.innerText = text;
            txt.style.color = text.includes('BUY') ? '#00ff88' : '#ff3366';
            el.style.display = 'block';
            
            // Играем звук
            audioSignal.play().catch(e => console.log("Sound blocked by browser"));

            setTimeout(() => { el.style.display = 'none'; }, 10000);
        }

        // Запуск
        updateData();
        setInterval(updateData, 30000); // Обновление каждые 30 сек

    </script>
</body>
</html>
