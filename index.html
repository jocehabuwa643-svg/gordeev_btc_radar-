<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BTC Radar PRO MAX - TEST MODE</title>
    <style>
        /* Твой дизайн остается прежним */
        body { background: #0a0b0d; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        #chart { width: 100vw; height: 100vh; }
        .status-bar { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; border: 1px solid #333; }
        .signal-alert { position: absolute; bottom: 50px; right: 50px; padding: 20px; background: #1ed760; color: black; font-weight: bold; border-radius: 10px; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="status-bar">
        <div>Статус: <span id="status" style="color: #1ed760;">СКАНИРОВАНИЕ РЫНКА...</span></div>
        <div id="pair">Пара: BTC/USDT (1M)</div>
    </div>

    <div id="signal" class="signal-alert">НОВЫЙ СИГНАЛ: ВХОД В ЛОНГ!</div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <script>
        // 1. ИНИЦИАЛИЗАЦИЯ ГРАФИКА
        const chart = LightweightCharts.createChart(document.body, {
            layout: { backgroundColor: '#0a0b0d', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1f222d' }, horzLines: { color: '#1f222d' } },
            timeScale: { timeVisible: true, secondsVisible: false }
        });
        const candleSeries = chart.addCandlestickSeries();

        // 2. ЛОГИКА ПОЛУЧЕНИЯ РЕАЛЬНЫХ ДАННЫХ (БЕЗ ФЕЙКОВ)
        async function fetchHistory() {
            document.getElementById('status').innerText = "ЗАГРУЗКА ИСТОРИИ...";
            try {
                // Скачиваем реальные 100 свечей (последние 100 минут) с Binance
                const response = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100');
                const data = await response.json();
                
                const candles = data.map(d => ({
                    time: d[0] / 1000,
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4])
                }));

                candleSeries.setData(candles);
                
                // Прогоняем историю через фильтр сигналов (за последний час)
                generateSignalsFromHistory(candles);
                
                document.getElementById('status').innerText = "LIVE SCANNER ACTIVE";
                document.getElementById('status').style.color = "#1ed760";
            } catch (e) {
                document.getElementById('status').innerText = "ОШИБКА BINANCE API";
                document.getElementById('status').style.color = "red";
            }
        }

        // 3. ПОИСК СИГНАЛОВ В ИСТОРИИ (SMC Logic - без перерисовки)
        function generateSignalsFromHistory(candles) {
            const markers = [];
            for (let i = 10; i < candles.length; i++) {
                const slice = candles.slice(i - 5, i);
                const high = Math.max(...slice.map(c => c.high));
                const low = Math.min(...slice.map(c => c.low));

                // Логика "Слома структуры" (простейший пример для теста)
                if (candles[i].close > high) {
                    markers.push({ time: candles[i].time, position: 'belowBar', color: '#1ed760', shape: 'arrowUp', text: 'SMC BUY' });
                } else if (candles[i].close < low) {
                    markers.push({ time: candles[i].time, position: 'aboveBar', color: '#f23645', shape: 'arrowDown', text: 'SMC SELL' });
                }
            }
            candleSeries.setMarkers(markers);
        }

        // 4. ЗАПУСК БЕЗ ЗАМКА
        fetchHistory();
        
        // Обновление данных каждую минуту
        setInterval(fetchHistory, 60000);

    </script>
</body>
</html>
